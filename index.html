<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landing Page</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-image: url('https://i.ytimg.com/vi/_nhfwHsEsDA/hq720.jpg');
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      min-height: 100vh;
      margin: 0;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color:#221507;
    }

    .container {
      background: rgba(255, 255, 255, 0.9);
      padding: 20px;
      width: 90%;
      max-width: 320px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }

    iframe {
      width: 90%;
      max-width: 400px;
      height: 400px;
      border: none;
      margin-top: 20px;
      display: none;
    }
  </style>
</head>

<body>

  <div class="container" id="formBox">
    <h2>أدخل إسمك</h2>
    <input type="text" id="nameInput" placeholder="إسمك">
    <button onclick="submitName()">إرسال</button>

    <div id="content"></div>
  </div>

  <!-- iframe -->
  <iframe id="lockerFrame"></iframe>

  <script>
    function submitName() {
      const name = document.getElementById("nameInput").value;
      const content = document.getElementById("content");

      if(name.trim() === "") {
        content.innerHTML = "من فضلك أدخل إسمك";
        content.style.color = "red";
      } else {
        content.innerHTML = "مرحبا " + name + " 👋";
        content.style.color = "green";

        // نخبي الفورم
        document.getElementById("formBox").style.display = "none";

        // نطلع content locker
        const frame = document.getElementById("lockerFrame");

        // 🔴 بدل هذا الرابط بالرابط ديالك
        frame.src = " https://unlock-content.net/?626e80d  ";

        frame.style.display = "block";
      }
    }
  </script>

</body>
</html>
